name: Online 2v2 smoke test

# Regression guard for real-time online play (the 2026-06-01 JWT-drop bug that
# silently broke all online matchmaking). Boots the real backend + drives 4
# browser clients through a full 2v2 game. See test/README.md.

on:
  push:
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install client/test deps
        run: npm ci

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Install Playwright Chromium (+ OS deps)
        run: npx playwright install --with-deps chromium

      - name: Email verification flow test
        run: npm run test:verify

      - name: Game analysis (review) UI test
        run: npm run test:review

      - name: Global rankings test
        run: npm run test:rankings

      - name: Rankings participation filter test
        run: npm run test:rankings-participation

      - name: Repeatable trophies + counter test
        run: npm run test:trophies-repeat

      - name: Minified build smoke test
        run: npm run test:build

      - name: Accessibility (keyboard + screen-reader) test
        run: npm run test:a11y

      - name: Arena tournaments (scoring + lifecycle + REST) test
        run: npm run test:arena

      - name: Arena realtime (pairing + bot-backfill + ELO isolation) test
        run: npm run test:arena-realtime

      - name: Arena client UI (lobby card + screen + leaderboard) test
        run: npm run test:arena-ui

      - name: Ranked seasonal switch test
        run: npm run test:ranked-flag

      - name: Checkers move animation test
        run: npm run test:checkers-anim

      - name: Stripe billing (inert + revenue) test
        run: npm run test:billing

      - name: Online checkers (ranked Elo + isolation) test
        run: npm run test:checkers-online

      - name: Friend checkers (unrated) challenge test
        run: npm run test:checkers-friend

      - name: Run 4-client 2v2 smoke test
        run: npm run smoke:2v2
